[project]
name = "aios-sdk"
version = "0.1.0"
description = "Typed Python SDK for the aios management plane"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
authors = [{ name = "aios contributors" }]

dependencies = [
    "httpx>=0.27",
    "attrs>=24.0",
    "python-dateutil>=2.9",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "ruff>=0.8",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["aios_sdk"]

[tool.ruff]
line-length = 100
target-version = "py313"
src = ["aios_sdk"]
# Build artifact from scripts/regen-client.sh; lint complaints belong
# upstream in openapi-python-client, not here.
extend-exclude = ["aios_sdk/_generated"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "SIM", "RUF", "TID", "ASYNC"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
disallow_untyped_defs = true
no_implicit_optional = true

# Build artifact from scripts/regen-client.sh; type complaints belong
# upstream in openapi-python-client, not here.
[[tool.mypy.overrides]]
module = "aios_sdk._generated.*"
ignore_errors = true
follow_imports = "skip"
