name: Code Validation

on:
  push:
    branches: [master]
  pull_request:

# Supersede stale runs.  A re-push to a PR cancels that PR's in-flight
# run; on master the running run keeps its verdict (cancel-in-progress
# is false for pushes) and a burst of stacked merges collapses pending
# intermediates to the tip, whose verdict is what "is master green"
# gates on.  Defends the account-wide runner pool against the observed
# contention mode where overlapping runs queued an e2e shard for ~7 min.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      run_checks: ${{ steps.filter.outputs.run_checks }}
      sandbox_changed: ${{ steps.filter.outputs.sandbox_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect build-affecting changes
        id: filter
        run: |
          echo "run_checks=true" >> "$GITHUB_OUTPUT"
          echo "sandbox_changed=false" >> "$GITHUB_OUTPUT"

  lint:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run ruff check src tests && uv run ruff format --check src tests

  unit:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run pytest tests/unit -q

  connectors:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run pytest connectors -q

  integration:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run pytest tests/integration -q

  e2e:
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [non-docker, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - name: E2E tests (non-docker shard)
        if: matrix.shard == 'non-docker'
        run: |
          for attempt in 1 2 3; do
            uv run pytest tests/e2e -q -m "not docker" && exit 0
            echo "::warning::Non-docker E2E attempt ${attempt} failed"
          done
          exit 1
      - name: E2E tests (docker shard)
        if: matrix.shard == 'docker'
        run: uv run pytest tests/e2e -q -m "docker"
