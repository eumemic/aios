name: Code Validation

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: aios
          POSTGRES_PASSWORD: aios
          POSTGRES_DB: aios_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      AIOS_DB_URL: postgresql://aios:aios@localhost:5432/aios_test

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Unit tests
        run: uv run pytest tests/unit -q

      - name: Build sandbox image
        run: docker build -t aios-sandbox:latest -f docker/Dockerfile.sandbox docker/

      - name: E2E tests
        run: uv run pytest tests/e2e -q
